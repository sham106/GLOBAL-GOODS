<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return customFetch; },
            set: function(val) { customFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Unable to patch window.fetch:', e);
        }
      })();
    </script>
